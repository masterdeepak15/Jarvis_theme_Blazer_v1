<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JarvisUI — Component Docs</title>
    <base href="/" />
    <link rel="icon" href="data:," />

    <!-- Leaflet CSS (for JLeafletMap) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- JarvisUI styles (served from the linked RCL under _content/JarvisUI) -->
    <link rel="stylesheet" href="_content/JarvisUI/css/jarvis-theme.css" />
    <link rel="stylesheet" href="_content/JarvisUI/css/jarvis-ui.css" />
    <link rel="stylesheet" href="_content/JarvisUI/css/jarvis-maps.css" />
    <link rel="stylesheet" href="_content/JarvisUI/css/jarvis-charts.css" />

    <!-- Docs app styles -->
    <link rel="stylesheet" href="css/docs.css" />
</head>

<body>
    <div id="app">
        <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
                    background:#020d18;color:#00e5ff;font-family:'Courier New',monospace;
                    letter-spacing:.2em;text-transform:uppercase;font-size:13px;">
            Initialising JARVIS UI…
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;position:fixed;bottom:0;left:0;right:0;
         background:#7f1d1d;color:#fff;padding:10px 16px;font-family:monospace;z-index:9999;">
        An unhandled error has occurred.
        <a href="" class="reload" style="color:#fff;text-decoration:underline;">Reload</a>
        <span class="dismiss" style="float:right;cursor:pointer;">🗙</span>
    </div>

    <!-- Leaflet JS (for JLeafletMap) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Google Maps JS (for JGoogleMap / MapIts page).
         NOTE: this key is shipped to the browser. Restrict it by HTTP referrer
         in Google Cloud Console, or replace it with your own restricted key. -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXk4hbKX0IhdRdpuDzp5oyfNbIdag3hS8"></script>

    <!-- JarvisUI Maps interop (from the RCL) -->
    <script src="_content/JarvisUI/js/jarvis-gmap.js"></script>
    <script src="_content/JarvisUI/js/jarvis-maps.js"></script>
    <script src="_content/JarvisUI/js/jarvis-leaflet.js"></script>

    <!-- Blazor WebAssembly runtime -->
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
